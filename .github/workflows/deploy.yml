name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Abhängigkeiten auschecken (für den Vite-Build)
      - uses: actions/checkout@v4
        with:
          repository: real-life-org/real-life-stack
          path: _deps/real-life-stack

      - uses: actions/checkout@v4
        with:
          repository: real-life-org/web-of-trust
          path: _deps/web-of-trust

      # Abhängigkeitspakete bauen
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: _deps/real-life-stack/pnpm-lock.yaml

      - name: Abhängigkeiten bauen
        run: |
          cd _deps/real-life-stack && pnpm install --no-frozen-lockfile --ignore-scripts && pnpm -r build || true
          cd ../../_deps/web-of-trust && pnpm install --no-frozen-lockfile --ignore-scripts && pnpm -r build || true

      # Symlinks: ../../real-life-stack von /home/runner/work/rln/rln/ = /home/runner/work/real-life-stack
      - name: Symlinks anlegen
        run: |
          ln -s "$(pwd)/_deps/real-life-stack" ../../real-life-stack
          ln -s "$(pwd)/_deps/web-of-trust" ../../web-of-trust
          ls -la ../../real-life-stack/packages/toolkit/dist/ || echo "toolkit dist missing"

      # RLN bauen — nur Vite, kein tsc
      - name: RLN bauen
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts
          VITE_BASE_PATH=/ npx vite build

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
