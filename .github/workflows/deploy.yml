name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          path: rln

      # Die Abhängigkeiten auschecken — beide sind öffentlich
      - uses: actions/checkout@v4
        with:
          repository: real-life-org/real-life-stack
          path: real-life-stack

      - uses: actions/checkout@v4
        with:
          repository: real-life-org/web-of-trust
          path: web-of-trust

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rln/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
