name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # rln (dieses Repo) — checken in Subdir damit Sibling-Repos daneben passen
      - name: Checkout rln
        uses: actions/checkout@v4
        with:
          path: rln

      # Real-Life-Stack: lichtungooo-Fork (Timos eigener Stand). Antons
      # real-life-org/master hat einen mid-flight Refactor (@real-life/wot-core)
      # der noch nicht mit web-of-trust synchronisiert ist. Spaeter mit Anton
      # abstimmen und ggf. wieder auf real-life-org/master umstellen.
      - name: Checkout real-life-stack (Timo-Fork)
        uses: actions/checkout@v4
        with:
          repository: lichtungooo/real-life-stack
          ref: master
          path: real-life-stack

      # Web-of-Trust (Antons Identitaets-Stack) — main-HEAD ist stabil
      - name: Checkout web-of-trust
        uses: actions/checkout@v4
        with:
          repository: antontranelis/web-of-trust
          ref: main
          path: web-of-trust

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          # Build-Context = Parent-Verzeichnis mit allen drei Repos
          context: .
          file: ./rln/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
